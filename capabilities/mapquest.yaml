naftiko: 1.0.0-alpha2
info:
  label: MapQuest Directions API
  description: 'MapQuest Directions API. 11 operations. Lead operation: Calculate alternate routes. Self-contained Naftiko
    capability covering one Mapquest business surface.'
  tags:
  - Mapquest
  - MapQuest Directions API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAPQUEST_API_KEY: MAPQUEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: mapquest
    baseUri: https://www.mapquestapi.com
    description: MapQuest Directions API business capability. Self-contained, no shared references.
    resources:
    - name: directions-v2-alternateroutes
      path: /directions/v2/alternateroutes
      operations:
      - name: getalternateroutes
        method: GET
        description: Calculate alternate routes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postalternateroutes
        method: POST
        description: Calculate alternate routes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: directions-v2-optimizedroute
      path: /directions/v2/optimizedroute
      operations:
      - name: getoptimizedroute
        method: GET
        description: Calculate an optimized route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postoptimizedroute
        method: POST
        description: Calculate an optimized route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: directions-v2-route
      path: /directions/v2/route
      operations:
      - name: getroute
        method: GET
        description: Calculate a route between locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postroute
        method: POST
        description: Calculate a route between locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: directions-v2-routematrix
      path: /directions/v2/routematrix
      operations:
      - name: postroutematrix
        method: POST
        description: Calculate a route matrix
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: directions-v2-routematrix-jobs
      path: /directions/v2/routematrix/jobs
      operations:
      - name: createroutematrixjob
        method: POST
        description: Submit an asynchronous route matrix job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: directions-v2-routematrix-jobs-jobId
      path: /directions/v2/routematrix/jobs/{jobId}
      operations:
      - name: getroutematrixjob
        method: GET
        description: Retrieve route matrix job status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
    - name: directions-v2-routematrix-jobs-jobId-results
      path: /directions/v2/routematrix/jobs/{jobId}/results
      operations:
      - name: getroutematrixjobresults
        method: GET
        description: Retrieve route matrix job results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
    - name: directions-v2-routeshape
      path: /directions/v2/routeshape
      operations:
      - name: getrouteshape
        method: GET
        description: Retrieve route shape geometry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mapquest-rest
    port: 8080
    description: REST adapter for MapQuest Directions API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/directions/v2/alternateroutes
      name: directions-v2-alternateroutes
      description: REST surface for directions-v2-alternateroutes.
      operations:
      - method: GET
        name: getalternateroutes
        description: Calculate alternate routes
        call: mapquest.getalternateroutes
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postalternateroutes
        description: Calculate alternate routes
        call: mapquest.postalternateroutes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/directions/v2/optimizedroute
      name: directions-v2-optimizedroute
      description: REST surface for directions-v2-optimizedroute.
      operations:
      - method: GET
        name: getoptimizedroute
        description: Calculate an optimized route
        call: mapquest.getoptimizedroute
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postoptimizedroute
        description: Calculate an optimized route
        call: mapquest.postoptimizedroute
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/directions/v2/route
      name: directions-v2-route
      description: REST surface for directions-v2-route.
      operations:
      - method: GET
        name: getroute
        description: Calculate a route between locations
