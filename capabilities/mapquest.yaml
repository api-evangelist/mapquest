        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/directions/v2/routematrix
      name: directions-v2-routematrix
      description: REST surface for directions-v2-routematrix.
      operations:
      - method: POST
        name: postroutematrix
        description: Calculate a route matrix
        call: mapquest.postroutematrix
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/directions/v2/routematrix/jobs
      name: directions-v2-routematrix-jobs
      description: REST surface for directions-v2-routematrix-jobs.
      operations:
      - method: POST
        name: createroutematrixjob
        description: Submit an asynchronous route matrix job
        call: mapquest.createroutematrixjob
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/directions/v2/routematrix/jobs/{jobid}
      name: directions-v2-routematrix-jobs-jobid
      description: REST surface for directions-v2-routematrix-jobs-jobId.
      operations:
      - method: GET
        name: getroutematrixjob
        description: Retrieve route matrix job status
        call: mapquest.getroutematrixjob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/directions/v2/routematrix/jobs/{jobid}/results
      name: directions-v2-routematrix-jobs-jobid-results
      description: REST surface for directions-v2-routematrix-jobs-jobId-results.
      operations:
      - method: GET
        name: getroutematrixjobresults
        description: Retrieve route matrix job results
        call: mapquest.getroutematrixjobresults
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/directions/v2/routeshape
      name: directions-v2-routeshape
      description: REST surface for directions-v2-routeshape.
      operations:
      - method: GET
        name: getrouteshape
        description: Retrieve route shape geometry
        call: mapquest.getrouteshape
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
