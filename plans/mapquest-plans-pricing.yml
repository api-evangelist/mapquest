        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://www.mapquestapi.com/directions/v2
          - https://www.mapquestapi.com/geocoding/v1
